<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Light</title>
    <style>
      body {
        background-color: aliceblue;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
      }

      .leftc {
        width: 80px;
        height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        background-color: aquamarine;
        padding: 10px;
        border-radius: 10px;
      }

      .leftc div {
        cursor: pointer;
        font-weight: bold;
        background-color: rgb(232, 145, 14);
        padding: 10px;
        border-radius: 5px;
        width: 50px;
      }

      .container {
        background-color: rgb(53, 46, 46);
        height: 300px;
        width: 200px;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        padding: 10px 0;
        border-radius: 10px;
      }

      .circle {
        width: 60px;
        height: 60px;
        background-color: gray;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="leftc">
      <div onclick="stopLight()">STOP</div>
      <div onclick="readyLight()">READY</div>
      <div onclick="goLight()">GO</div>
    </div>

    <div class="container">
      <div class="circle" id="c1"></div>
      <div class="circle" id="c2"></div>
      <div class="circle" id="c3"></div>
    </div>

    <script>
      const red = document.getElementById("c1");
      const yellow = document.getElementById("c2");
      const green = document.getElementById("c3");

      function turnOffAll() {
        red.style.backgroundColor = "gray";
        yellow.style.backgroundColor = "gray";
        green.style.backgroundColor = "gray";
      }

      function stopLight() {
        turnOffAll();
        red.style.backgroundColor = "red";
      }

      function readyLight() {
        turnOffAll();
        yellow.style.backgroundColor = "yellow";
      }

      function goLight() {
        turnOffAll();
        green.style.backgroundColor = "green";
      }
    </script>
  </body>
</html>
